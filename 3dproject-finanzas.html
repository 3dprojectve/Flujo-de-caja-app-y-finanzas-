<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2d6a4f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="3dproject" />
  <title>3dproject.ve — Finanzas</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%232d6a4f'/><text y='.85em' font-size='64' x='50' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>$</text></svg>" />

  <!-- PWA Manifest -->
  <script>
    (() => {
      const m = {
        name:"3dproject.ve Finanzas",short_name:"3dproject",start_url:".",
        display:"standalone",background_color:"#f6f5f2",theme_color:"#2d6a4f",
        icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%232d6a4f'/><text y='.85em' font-size='64' x='50' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>$</text></svg>",sizes:"192x192",type:"image/svg+xml"}]
      };
      const l=document.createElement('link');
      l.rel='manifest';
      l.href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));
      document.head.appendChild(l);
    })();
  </script>

  <!-- Service Worker -->
  <script>
    if('serviceWorker'in navigator){
      const sw=`const C='3dp-v6';
self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['.']))));
self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k))))));
self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(fetch(e.request).then(r=>{const rc=r.clone();caches.open(C).then(c=>c.put(e.request,rc));return r;}).catch(()=>caches.match(e.request)));});`;
      navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
    }
  </script>

  <!-- jsPDF para cotizaciones -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Lora:wght@400;600&display=swap" rel="stylesheet"/>

  <!-- Firebase v11 -->
  <script type="module">
    import{initializeApp}from"https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
    import{getFirestore,collection,addDoc,onSnapshot,query,orderBy,deleteDoc,doc,serverTimestamp}from"https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

    const app=initializeApp({
      apiKey:"AIzaSyAfaZgFvqJSmJTv3F0szctki4Y-X9tZcsw",
      authDomain:"dprojectve.firebaseapp.com",
      projectId:"dprojectve",
      storageBucket:"dprojectve.firebasestorage.app",
      messagingSenderId:"512478778863",
      appId:"1:512478778863:web:98d700575349eef775121a",
      measurementId:"G-W7GN3SM6GP"
    });
    const auth=getAuth(app);
    const db=getFirestore(app);

    // ── State ────────────────────────────────
    let currentUser=null,allTxs=[],unsubTxs=null;
    let bcvRate=0,parRate=0;
    let activeTab='dashboard',filterCat='',filterFrom='',filterTo='';

    const CATS=['Ventas','Pago a Proveedores','Inversión','Pago a Socios','Gastos Operativos'];
    const METHODS=['Pago Móvil','Zelle','Binance','PayPal','Efectivo'];
    const MICONS={'Pago Móvil':'fa-mobile-screen','Zelle':'fa-building-columns','Binance':'fa-bitcoin-sign','PayPal':'fa-paypal','Efectivo':'fa-money-bill-wave'};

    const fmt=v=>new Intl.NumberFormat('es-VE',{minimumFractionDigits:2,maximumFractionDigits:2}).format(v);
    const fmtD=d=>{const dt=d?.seconds?new Date(d.seconds*1000):new Date(d);return dt.toLocaleDateString('es-VE',{day:'2-digit',month:'short',year:'numeric'});};

    function show(id){document.getElementById(id).style.display='flex';}
    function hide(id){document.getElementById(id).style.display='none';}

    // ── BCV API ───────────────────────────────
    async function fetchRates(){
      try{
        const data=await(await fetch('https://ve.dolarapi.com/v1/dolares')).json();
        const bcv=data.find(d=>d.fuente?.toLowerCase()==='oficial'||d.nombre?.toLowerCase().includes('oficial'));
        const par=data.find(d=>d.fuente?.toLowerCase()==='paralelo'||d.nombre?.toLowerCase().includes('paralelo'));
        if(bcv)bcvRate=parseFloat(bcv.promedio??bcv.venta??0);
        if(par)parRate=parseFloat(par.promedio??par.venta??0);
      }catch(_){}
      const b=document.getElementById('bcv-pill');
      const p=document.getElementById('par-pill');
      if(b)b.textContent=bcvRate>0?`BCV Bs.${fmt(bcvRate)}`:'BCV —';
      if(p)p.textContent=parRate>0?`Par Bs.${fmt(parRate)}`:'Par —';
      updateConverter();
    }

    // ── Converter (triple) ────────────────────
    window.updateConverter=()=>{
      const val=parseFloat(document.getElementById('conv-input')?.value)||0;
      const mode=document.getElementById('conv-mode')?.value||'usd';
      const pv=parseFloat(document.getElementById('par-rate-input')?.value)||parRate;
      let usd=0,bsBcv=0,bsPar=0;
      if(mode==='usd'){usd=val;bsBcv=val*bcvRate;bsPar=val*pv;}
      else if(mode==='bs_bcv'){bsBcv=val;usd=bcvRate>0?val/bcvRate:0;bsPar=usd*pv;}
      else{bsPar=val;usd=pv>0?val/pv:0;bsBcv=usd*bcvRate;}
      const e1=document.getElementById('res-usd');
      const e2=document.getElementById('res-bcv');
      const e3=document.getElementById('res-par');
      const eg=document.getElementById('res-gain');
      const gr=document.getElementById('gain-row');
      if(e1)e1.textContent=`$${fmt(usd)}`;
      if(e2)e2.textContent=`Bs. ${fmt(bsBcv)}`;
      if(e3)e3.textContent=`Bs. ${fmt(bsPar)}`;
      if(eg&&gr){
        if(mode==='bs_bcv'&&pv>0&&bcvRate>0&&val>0){
          const usdReal=val/pv;const diff=usd-usdReal;
          const pct=usd>0?((diff/usd)*100).toFixed(1):0;
          eg.textContent=`Si cobraste en Bs. a tasa BCV, tu valor real es $${fmt(usdReal)} — pierdes $${fmt(Math.abs(diff))} (${Math.abs(pct)}%) vs paralelo`;
          gr.style.display='flex';
        }else{gr.style.display='none';}
      }
    };
    window.syncPrefix=()=>{
      const m=document.getElementById('conv-mode')?.value||'usd';
      const l=document.getElementById('conv-prefix-label');
      if(l)l.textContent=m==='usd'?'$':'Bs.';
    };

    // ── Auth ──────────────────────────────────
    onAuthStateChanged(auth,user=>{
      currentUser=user;
      if(user){
        hide('login-screen');show('app-shell');
        fetchRates();
        if(!unsubTxs)subscribeData();
      }else{
        show('login-screen');hide('app-shell');
        if(unsubTxs){unsubTxs();unsubTxs=null;}
        allTxs=[];
      }
    });

    window.doLogin=async()=>{
      const email=document.getElementById('l-email').value.trim();
      const pass=document.getElementById('l-pass').value;
      const err=document.getElementById('l-err');
      const btn=document.getElementById('l-btn');
      err.textContent='';btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Ingresando…';btn.disabled=true;
      try{await signInWithEmailAndPassword(auth,email,pass);}
      catch(e){
        err.textContent='Correo o contraseña incorrectos.';
        btn.innerHTML='<i class="fa-solid fa-right-to-bracket"></i> Ingresar';
        btn.disabled=false;
      }
    };
    window.doLogout=()=>signOut(auth);

    // ── Firestore ─────────────────────────────
    function subscribeData(){
      const q=query(collection(db,'users',currentUser.uid,'transactions'),orderBy('date','desc'));
      unsubTxs=onSnapshot(q,snap=>{
        allTxs=snap.docs.map(d=>({id:d.id,...d.data()}));
        render();
      });
    }

    window.saveTx=async()=>{
      const concept=document.getElementById('f-concept').value.trim();
      const amount=parseFloat(document.getElementById('f-amount').value.replace(',','.'));
      const type=document.getElementById('f-type').value;
      const cat=document.getElementById('f-cat').value;
      const method=document.getElementById('f-method').value;
      const dateStr=document.getElementById('f-date').value;
      const parUsed=parseFloat(document.getElementById('f-par-rate').value)||parRate;
      if(!concept||!amount||!dateStr){showToast('Completa todos los campos','err');return;}
      const btn=document.querySelector('.btn-save');
      if(btn)btn.disabled=true;
      await addDoc(collection(db,'users',currentUser.uid,'transactions'),{
        concept,amount,type,category:cat,paymentMethod:method,
        bcvRate,parRate:parUsed,date:new Date(dateStr+'T12:00:00'),createdAt:serverTimestamp()
      });
      if(btn)btn.disabled=false;
      document.getElementById('tx-form').reset();
      document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
      closeForm();
      showToast('Transacción guardada ✓');
    };

    window.deleteTx=async id=>{
      if(!confirm('¿Eliminar esta transacción?'))return;
      await deleteDoc(doc(db,'users',currentUser.uid,'transactions',id));
      showToast('Eliminado');
    };

    // ── Navigation ────────────────────────────
    window.goTab=tab=>{
      activeTab=tab;
      document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
      render();
    };
    window.applyFilter=()=>{
      filterCat=document.getElementById('fil-cat')?.value||'';
      filterFrom=document.getElementById('fil-from')?.value||'';
      filterTo=document.getElementById('fil-to')?.value||'';
      render();
    };
    window.clearFilter=()=>{filterCat=filterFrom=filterTo='';render();};

    window.openForm=()=>{
      document.getElementById('tx-form').reset();
      document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
      document.getElementById('f-type').value='Ingreso';
      document.getElementById('f-par-rate').value=parRate>0?parRate.toFixed(2):'';
      const ri=document.getElementById('form-rate-info');
      if(ri)ri.textContent=bcvRate>0?`BCV: Bs.${fmt(bcvRate)} · Paralelo: Bs.${fmt(parRate)}`:'';
      document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('sel-in','sel-out'));
      document.querySelector('.type-btn[data-v="Ingreso"]').classList.add('sel-in');
      document.getElementById('modal-title').textContent='Nueva transacción';
      document.getElementById('tx-modal').style.display='flex';
      setTimeout(()=>document.getElementById('f-concept')?.focus(),120);
    };
    window.closeForm=()=>{document.getElementById('tx-modal').style.display='none';};
    window.refetchRates=async()=>{showToast('Actualizando…');await fetchRates();render();showToast('Tasas actualizadas ✓');};

    // ── Toast ─────────────────────────────────
    function showToast(msg,type='ok'){
      const t=document.getElementById('toast');
      t.textContent=msg;t.className='toast show'+(type==='err'?' err':'');
      setTimeout(()=>t.className='toast',3000);
    }

    // ── Render ────────────────────────────────
    function render(){
      if(activeTab==='dashboard')renderDashboard();
      else if(activeTab==='converter')renderConverter();
      else if(activeTab==='cotizador')renderCotizador();
      else if(activeTab==='history')renderHistory();
      else if(activeTab==='settings')renderSettings();
    }

    function filteredTxs(){
      return allTxs.filter(tx=>{
        if(filterCat&&tx.category!==filterCat)return false;
        const d=tx.date?.seconds?new Date(tx.date.seconds*1000):new Date(tx.date);
        if(filterFrom&&d<new Date(filterFrom))return false;
        if(filterTo&&d>new Date(filterTo+'T23:59:59'))return false;
        return true;
      });
    }

    // ── Dashboard ─────────────────────────────
    function renderDashboard(){
      const income=allTxs.filter(t=>t.type==='Ingreso').reduce((s,t)=>s+t.amount,0);
      const expense=allTxs.filter(t=>t.type==='Egreso').reduce((s,t)=>s+t.amount,0);
      const net=income-expense;
      const byMethod={};METHODS.forEach(m=>byMethod[m]=0);
      allTxs.forEach(t=>{byMethod[t.paymentMethod]=(byMethod[t.paymentMethod]||0)+(t.type==='Ingreso'?t.amount:-t.amount);});
      const pct=income+expense>0?Math.round((income/(income+expense))*100):0;

      document.getElementById('main-content').innerHTML=`
        <div class="page-title">Resumen</div>
        <div class="summary-cards">
          <div class="sum-card sum-income">
            <div class="sum-icon"><i class="fa-solid fa-arrow-trend-up"></i></div>
            <div class="sum-body">
              <div class="sum-label">Ingresos</div>
              <div class="sum-value pos">$${fmt(income)}</div>
              <div class="sum-sub">Bs. ${fmt(income*bcvRate)}</div>
            </div>
          </div>
          <div class="sum-card sum-expense">
            <div class="sum-icon"><i class="fa-solid fa-arrow-trend-down"></i></div>
            <div class="sum-body">
              <div class="sum-label">Egresos</div>
              <div class="sum-value neg">$${fmt(expense)}</div>
              <div class="sum-sub">Bs. ${fmt(expense*bcvRate)}</div>
            </div>
          </div>
          <div class="sum-card sum-net">
            <div class="sum-icon"><i class="fa-solid fa-scale-balanced"></i></div>
            <div class="sum-body">
              <div class="sum-label">Balance neto</div>
              <div class="sum-value ${net>=0?'pos':'neg'}">$${fmt(net)}</div>
              <div class="sum-sub">Bs. ${fmt(net*bcvRate)}</div>
            </div>
          </div>
        </div>
        <div class="kpi-bar">
          <div class="kpi-bar-track"><div class="kpi-bar-fill" style="width:${pct}%"></div></div>
          <div class="kpi-bar-labels">
            <span><i class="fa-solid fa-circle" style="color:var(--pos);font-size:8px"></i> Ingresos ${pct}%</span>
            <span><i class="fa-solid fa-circle" style="color:var(--neg);font-size:8px"></i> Egresos ${100-pct}%</span>
          </div>
        </div>
        <div class="section-label">Por método de pago</div>
        <div class="methods-grid">
          ${METHODS.map(m=>{const v=byMethod[m]||0;return`<div class="method-card">
            <div class="method-top"><i class="fa-solid ${MICONS[m]} method-icon"></i><span class="method-name">${m}</span></div>
            <div class="method-usd ${v>=0?'pos':'neg'}">$${fmt(v)}</div>
            <div class="method-ves">Bs. ${fmt(v*bcvRate)}</div>
          </div>`;}).join('')}
        </div>
        <div class="section-label">Últimas transacciones</div>
        <div class="tx-list">
          ${allTxs.slice(0,6).length===0
            ?`<div class="empty"><i class="fa-regular fa-folder-open" style="font-size:28px;margin-bottom:10px;display:block"></i>Aún no hay transacciones.<br>Toca <strong>+ Nueva</strong> para empezar.</div>`
            :allTxs.slice(0,6).map(tx=>txRow(tx,false)).join('')}
        </div>`;
    }

    // ── Converter ─────────────────────────────
    function renderConverter(){
      document.getElementById('main-content').innerHTML=`
        <div class="page-title">Conversor</div>
        <div class="converter-card">
          <div class="conv-row-top">
            <label class="conv-mode-label">Ingresando en</label>
            <select id="conv-mode" onchange="updateConverter();syncPrefix()" class="conv-mode-select">
              <option value="usd">Dólares (USD)</option>
              <option value="bs_bcv">Bolívares a tasa BCV</option>
              <option value="bs_par">Bolívares a tasa Paralelo</option>
            </select>
          </div>
          <div class="conv-input-wrap">
            <span class="conv-prefix" id="conv-prefix-label">$</span>
            <input id="conv-input" type="number" step="0.01" min="0" placeholder="0.00" oninput="updateConverter()" autocomplete="off"/>
          </div>
        </div>
        <div class="triple-grid">
          <div class="triple-card triple-usd">
            <div class="triple-header"><i class="fa-solid fa-dollar-sign"></i> USD</div>
            <div class="triple-value" id="res-usd">$0,00</div>
          </div>
          <div class="triple-card triple-bcv">
            <div class="triple-header"><i class="fa-solid fa-landmark"></i> Bolívares (BCV)</div>
            <div class="triple-value" id="res-bcv">Bs. 0,00</div>
            <div class="triple-rate">Tasa: Bs.${bcvRate>0?fmt(bcvRate):'—'}</div>
          </div>
          <div class="triple-card triple-par">
            <div class="triple-header"><i class="fa-solid fa-chart-line"></i> Bolívares (Paralelo)</div>
            <div class="triple-value" id="res-par">Bs. 0,00</div>
            <div class="triple-rate-edit">
              <span>Tasa Bs.</span>
              <input id="par-rate-input" type="number" step="0.01"
                value="${parRate>0?parRate.toFixed(2):''}"
                placeholder="${parRate>0?fmt(parRate):'editar'}"
                oninput="updateConverter()"/>
              <i class="fa-solid fa-pen-to-square" style="color:var(--text3);font-size:10px"></i>
            </div>
          </div>
        </div>
        <div class="gain-row" id="gain-row" style="display:none">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <span id="res-gain"></span>
        </div>
        <div class="conv-hint">
          <i class="fa-solid fa-circle-info"></i>
          Selecciona <strong>"Bolívares a tasa BCV"</strong> para ver cuánto vale realmente en USD de mercado lo que cobraste en Bs.
        </div>`;
      setTimeout(updateConverter,30);
    }

    // ── Cotizador ─────────────────────────────
    function renderCotizador(){
      document.getElementById('main-content').innerHTML=`
        <div class="page-title">Generador de Cotizaciones</div>
        <div class="cotiz-nota-top">
          <i class="fa-solid fa-circle-info"></i>
          Costos calculados <strong>por unidad</strong>. Ajusta la amortización de tu impresora para que el precio sea exacto a tu negocio.
        </div>
        <div class="cotiz-grid">

          <div class="cotiz-form-card">

            <div class="cotiz-section-title"><i class="fa-solid fa-user" style="color:var(--green)"></i> Datos del pedido</div>
            <div class="cotiz-row-2">
              <div class="form-group"><label>Cliente</label><input type="text" id="q-cliente" placeholder="Ej: Juan Perez" oninput="calcQuote()"/></div>
              <div class="form-group"><label>Nombre de la pieza</label><input type="text" id="q-pieza" placeholder="Ej: Engranaje" value="Pieza Personalizada" oninput="calcQuote()"/></div>
            </div>
            <div class="cotiz-row-2">
              <div class="form-group"><label>Cantidad de piezas</label><input type="number" id="q-cant" value="1" min="1" oninput="calcQuote()"/></div>
              <div class="form-group">
                <label>Precio en cotizacion</label>
                <select id="q-modo" onchange="calcQuote()" style="-webkit-appearance:none">
                  <option value="unit">Por pieza individual</option>
                  <option value="total">Total del lote completo</option>
                </select>
              </div>
            </div>

            <div class="cotiz-section-title" style="margin-top:14px"><i class="fa-solid fa-cube" style="color:var(--green)"></i> Parametros de impresion</div>
            <div class="cotiz-row-4">
              <div class="form-group"><label>Horas</label><input type="number" id="q-horas" value="1" min="0" oninput="calcQuote()"/></div>
              <div class="form-group"><label>Minutos</label><input type="number" id="q-minutos" value="30" min="0" max="59" oninput="calcQuote()"/></div>
              <div class="form-group"><label>Gramos</label><input type="number" id="q-gramos" value="25" min="1" oninput="calcQuote()"/></div>
              <div class="form-group"><label>Material</label>
                <select id="q-material" onchange="calcQuote()" style="-webkit-appearance:none">
                  <option>PLA</option><option>PETG</option><option>ABS</option><option>TPU</option>
                </select>
              </div>
            </div>
            <div class="cotiz-row-2">
              <div class="form-group"><label>Costo material ($/kg)</label><input type="number" id="q-costoMat" value="25.00" step="0.01" oninput="calcQuote()"/></div>
              <div class="form-group">
                <label>Amortizacion impresora ($/hr) <span class="cotiz-tip" title="Precio impresora / vida util en horas + electricidad + desgaste. Ej: $300 / 3000h = $0.10 + $0.02 elec + $0.02 desgaste = $0.14/hr">?</span></label>
                <input type="number" id="q-amort" value="0.15" step="0.01" min="0.01" oninput="calcQuote()"/>
              </div>
            </div>
            <div class="cotiz-row-2">
              <div class="form-group">
                <label>% Error / desperdicio <span class="cotiz-tip" title="Colchon por fallos de impresion. Se aplica sobre el costo de material. Recomendado 10-15%">?</span></label>
                <input type="number" id="q-error" value="10" min="0" max="50" step="1" oninput="calcQuote()"/>
              </div>
              <div class="form-group">
                <label>Post-proceso (min) <span class="cotiz-tip" title="Minutos de trabajo manual: quitar soportes, lijar, limpiar. Se cobra a la tarifa de mano de obra definida abajo.">?</span></label>
                <input type="number" id="q-postmin" value="10" min="0" oninput="calcQuote()"/>
              </div>
            </div>
            <div class="cotiz-row-2">
              <div class="form-group"><label>Tarifa mano de obra ($/hr)</label><input type="number" id="q-mano" value="2.00" step="0.25" min="0" oninput="calcQuote()"/></div>
              <div class="form-group">
                <label>Utilidad: <strong id="q-ganancia-val">100</strong>%</label>
                <input type="range" id="q-ganancia" min="10" max="400" value="100" style="width:100%;accent-color:var(--green);margin-top:8px" oninput="document.getElementById('q-ganancia-val').textContent=this.value;calcQuote()"/>
              </div>
            </div>

            <div class="cotiz-section-title" style="margin-top:14px"><i class="fa-solid fa-box" style="color:var(--green)"></i> Packaging</div>
            <div class="cotiz-row-2">
              <div class="form-group"><label>Costo real del empaque ($)</label><input type="number" id="q-emp-costo" value="0.50" step="0.01" min="0" oninput="calcQuote()"/></div>

    window.calcQuote=()=>{
      // ── Leer inputs ───────────────────────────
      const h       =parseFloat(document.getElementById('q-horas')?.value)||0;
      const min     =parseFloat(document.getElementById('q-minutos')?.value)||0;
      const g       =parseFloat(document.getElementById('q-gramos')?.value)||0;
      const costMat =parseFloat(document.getElementById('q-costoMat')?.value)||0;
      const amort   =parseFloat(document.getElementById('q-amort')?.value)||0.15;
      const errPct  =parseFloat(document.getElementById('q-error')?.value)||10;
      const postMin =parseFloat(document.getElementById('q-postmin')?.value)||0;
      const manoHr  =parseFloat(document.getElementById('q-mano')?.value)||2;
      const ganP    =parseFloat(document.getElementById('q-ganancia')?.value)||100;
      const cant    =Math.max(1,parseInt(document.getElementById('q-cant')?.value)||1);
      const modo    =document.getElementById('q-modo')?.value||'unit';

      // ── Costos reales de cada componente ──────
      const totalHrs   =h+(min/60);
      const cMaterial  =((g/1000)*costMat)*(1+errPct/100); // filamento + colchon error
      const cMaquina   =totalHrs*amort;                     // desgaste impresora
      const cPostProc  =(postMin/60)*manoHr;                // tu tiempo

      const empCosto   =parseFloat(document.getElementById('q-emp-costo')?.value)||0;
      const empMargen  =parseFloat(document.getElementById('q-emp-margen')?.value)||0;

      const argOn  =document.getElementById('x-argolla')?.checked;
      const argC   =parseInt(document.getElementById('x-argolla-cant')?.value)||1;
      const argM   =parseFloat(document.getElementById('x-argolla-margen')?.value)||30;
      const cArgolla=argOn?0.30*argC:0;

      const nfcOn  =document.getElementById('x-nfc')?.checked;
      const nfcC   =parseInt(document.getElementById('x-nfc-cant')?.value)||1;
      const nfcM   =parseFloat(document.getElementById('x-nfc-margen')?.value)||30;
      const cNfc   =nfcOn?0.60*nfcC:0;

      const pinOn  =document.getElementById('x-pintura')?.checked;
      const cPin   =pinOn?parseFloat(document.getElementById('x-pintura-costo')?.value)||0:0;
      const pinM   =parseFloat(document.getElementById('x-pintura-margen')?.value)||30;

      // ── COSTO TOTAL REAL (lo que pagas tú) ────
      // Incluye TODO: produccion + empaque + accesorios, sin márgenes.
      const costoTotal    =cMaterial+cMaquina+cPostProc+empCosto+cArgolla+cNfc+cPin;
      const costoTotalVes =costoTotal*bcvRate;

      // ── PRECIO USD ────────────────────────────
      // La utilidad % se aplica sobre el COSTO TOTAL COMPLETO.
      // Asi 100% utilidad = cobras el doble de lo que te costo todo.
      // Ademas cada accesorio y el empaque tienen su propio % de margen
      // ADICIONAL que se suma encima de la utilidad base.
      //
      // Formula:
      //   precioBase = costoTotal × (1 + utilidad%)
      //   extra empaque = costoEmpaque × margenEmpaque%   <- ganancia EXTRA sobre empaque
      //   extra argolla = costoArgolla × margenArgolla%   <- ganancia EXTRA sobre argolla
      //   precioUSD = precioBase + extras
      //
      // Ejemplo: costo=$1.85, utilidad=100%, empaque costo=$0.50 margen=20%
      //   precioBase = $1.85 × 2 = $3.70
      //   extra empaque = $0.50 × 0.20 = $0.10
      //   precioUSD = $3.70 + $0.10 = $3.80
      //   ganancia real = $3.80 - $1.85 = $1.95 (105% markup sobre costo)

      const precioBase    =costoTotal*(1+ganP/100);
      const extraEmpaque  =empCosto*(empMargen/100);
      const extraArgolla  =argOn?cArgolla*(argM/100):0;
      const extraNfc      =nfcOn?cNfc*(nfcM/100):0;
      const extraPin      =pinOn?cPin*(pinM/100):0;
      const precioUSD     =precioBase+extraEmpaque+extraArgolla+extraNfc+extraPin;

      const gananciaUSD   =precioUSD-costoTotal;
      // Markup = ganancia / costo (lo que controla el slider)
      const markupReal    =costoTotal>0?(gananciaUSD/costoTotal)*100:0;
      // Margen = ganancia / precio (siempre menor que markup, es normal)
      const margenUSD     =precioUSD>0?(gananciaUSD/precioUSD)*100:0;

      // ── PRECIO Bs. (tasa PARALELA) ─────────────
      // Multiplica el precio USD por la tasa paralela.
      // Asi el cliente que paga en Bs. te da el equivalente real de mercado.
      // Lo que equivale a BCV siempre sera MAS que el precio USD base
      // porque la tasa BCV esta subvaluada — esa diferencia te protege.
      const vesUnit       =precioUSD*parRate;
      const vesEnUsdBcv   =bcvRate>0?vesUnit/bcvRate:0; // cuanto "vale" en USD segun BCV
      const gananciaVes   =vesEnUsdBcv-costoTotal;
      const margenVes     =vesEnUsdBcv>0?(gananciaVes/vesEnUsdBcv)*100:0;
      const brecha        =bcvRate>0?((parRate/bcvRate)-1)*100:0;

      // Lote
      const precioTotalUSD=precioUSD*cant;
      const vesTotalUnit  =vesUnit*cant;

      // ── Helpers ───────────────────────────────
      const set    =(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
      const showRow=(id,s)=>{const el=document.getElementById(id);if(el)el.style.display=s?'flex':'none';};
      const fmtVes =v=>v.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});

      // ── Actualizar UI: Costo real ─────────────
      set('q-res-material',  '$'+cMaterial.toFixed(2));
      set('q-res-maquina',   '$'+cMaquina.toFixed(2));
      set('q-res-postproc',  '$'+cPostProc.toFixed(2));
      set('q-res-emp-raw',   '$'+empCosto.toFixed(2));
      showRow('q-row-arg-raw',argOn); set('q-res-arg-raw','$'+cArgolla.toFixed(2));
      showRow('q-row-nfc-raw',nfcOn); set('q-res-nfc-raw','$'+cNfc.toFixed(2));
      showRow('q-row-pin-raw',pinOn); set('q-res-pin-raw','$'+cPin.toFixed(2));
      set('q-res-costo-total','$'+costoTotal.toFixed(2));
      set('q-res-costo-ves',  'Bs. '+fmtVes(costoTotalVes));

      // ── Actualizar UI: Precio USD ─────────────
      set('q-res-usd',  '$'+precioUSD.toFixed(2));
      set('q-gan-usd',  '$'+gananciaUSD.toFixed(2));
      // Mostrar AMBOS: markup (el que controla el slider) y margen sobre precio
      set('q-pct-usd',  markupReal.toFixed(0)+'% markup · '+margenUSD.toFixed(0)+'% margen');

      // ── Actualizar UI: Precio Bs. ─────────────
      const lbl=document.getElementById('q-price-label-ves');
      if(lbl)lbl.textContent=modo==='unit'?'Precio por pieza (Bs.)':'Total lote (Bs.)';
      const vesShow=modo==='unit'?vesUnit:vesTotalUnit;
      const bcvShow=modo==='unit'?vesEnUsdBcv:vesEnUsdBcv*cant;
      set('q-res-ves',    fmtVes(vesShow));
      set('q-res-bcvusd', '$'+bcvShow.toFixed(2));
      set('q-pct-ves',    margenVes.toFixed(0)+'% margen en Bs.');

      // ── Brecha info ───────────────────────────
      const brechaEl=document.getElementById('q-brecha-texto');
      if(brechaEl&&parRate>0&&bcvRate>0){
        const diferencial=vesEnUsdBcv-precioUSD;
        brechaEl.innerHTML=
          'Brecha actual: <strong>'+brecha.toFixed(1)+'%</strong>. '+
          'Si cobras en Bs. el cliente paga Bs.&nbsp;'+fmtVes(vesUnit)+
          ', que a BCV equivale a <strong>$'+vesEnUsdBcv.toFixed(2)+'</strong> vs '+
          '<strong>$'+precioUSD.toFixed(2)+'</strong> en USD. '+
          (diferencial>0
            ? 'Cobras <strong>$'+diferencial.toFixed(2)+' más</strong> en términos BCV — la brecha trabaja a tu favor.'
            : 'Sin diferencial de brecha.');
      }

      // ── Lote ──────────────────────────────────
      const loteBoxUSD=document.getElementById('q-lote-usd-info');
      const loteBoxVES=document.getElementById('q-lote-ves-info');
      if(cant>1){
        if(loteBoxUSD)loteBoxUSD.style.display='flex';
        if(loteBoxVES)loteBoxVES.style.display='flex';
        set('q-lote-cant',     cant);
        set('q-lote-usd',      '$'+precioTotalUSD.toFixed(2));
        set('q-lote-cant-ves', cant);
        set('q-lote-ves',      fmtVes(vesTotalUnit)+' Bs.');
      }else{
        if(loteBoxUSD)loteBoxUSD.style.display='none';
        if(loteBoxVES)loteBoxVES.style.display='none';
      }
    };

    window.generatePDF=()=>{
      if(typeof window.jspdf==='undefined'){showToast('PDF no disponible aun, espera un momento','err');return;}
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF();
      const cliente  =document.getElementById('q-cliente')?.value   ||'Cliente Particular';
      const pieza    =document.getElementById('q-pieza')?.value     ||'Pieza de Manufactura';
      const material =document.getElementById('q-material')?.value  ||'PLA';
      const gramos   =document.getElementById('q-gramos')?.value    ||'0';
      const horas    =document.getElementById('q-horas')?.value     ||'0';
      const minutos  =document.getElementById('q-minutos')?.value   ||'0';
      const cant     =parseInt(document.getElementById('q-cant')?.value)||1;
      const modo     =document.getElementById('q-modo')?.value||'unit';
      const precioUSD=document.getElementById('q-res-usd')?.textContent    ||'$0.00';
      const precioVES=document.getElementById('q-res-ves')?.textContent    ||'0,00';
      const precioBCV=document.getElementById('q-res-bcvusd')?.textContent ||'$0.00';
      const margenUSD=document.getElementById('q-pct-usd')?.textContent   ||'0%';
      const margenVES=document.getElementById('q-pct-ves')?.textContent   ||'0%';
      const fecha    =new Date().toLocaleDateString('es-VE');
      const argOn=document.getElementById('x-argolla')?.checked;
      const nfcOn=document.getElementById('x-nfc')?.checked;
      const pinOn=document.getElementById('x-pintura')?.checked;
      const extras=[];
      if(argOn){const c=document.getElementById('x-argolla-cant')?.value||1;extras.push('Argolla llavero x'+c);}
      if(nfcOn){const c=document.getElementById('x-nfc-cant')?.value||1;    extras.push('Tag NFC x'+c);}
      if(pinOn){const c=document.getElementById('x-pintura-costo')?.value||'0';extras.push('Pintura ($'+c+')');}

      // Encabezado
      doc.setFont('times','bold');doc.setFontSize(18);doc.setTextColor(27,48,34);
      doc.text('3DPROJECT.VE',105,20,{align:'center'});
      doc.setFont('times','normal');doc.setFontSize(10);doc.setTextColor(80,80,80);
      doc.text('Manufactura Aditiva de Precision',105,27,{align:'center'});
      doc.setDrawColor(27,48,34);doc.setLineWidth(0.5);doc.line(20,31,190,31);
      const sY=40;
      doc.setFont('times','bold');doc.setFontSize(13);doc.setTextColor(27,48,34);
      doc.text('COTIZACION DE SERVICIOS',105,sY,{align:'center'});
      doc.setFont('times','normal');doc.setFontSize(11);doc.setTextColor(50,50,50);
      doc.text('Cliente: '+cliente,20,sY+12);
      doc.text('Fecha:   '+fecha,  20,sY+20);
      doc.text('Proyecto: '+pieza, 20,sY+28);

      // Tabla especificaciones
      const specBody=[
        ['Material',material],
        ['Filamento',gramos+'g'],
        ['Tiempo de impresion',horas+'h '+minutos+'min'],
      ];
      if(extras.length)specBody.push(['Accesorios / Acabados',extras.join(' / ')]);
      specBody.push(['Cantidad',cant+' unidad'+(cant!==1?'es':'')]);
      doc.autoTable({
        startY:sY+38,head:[['Especificacion','Detalle']],body:specBody,theme:'grid',
        headStyles:{fillColor:[27,48,34],textColor:[255,255,255],fontStyle:'bold',fontSize:10,halign:'center',font:'times'},
        styles:{font:'times',fontSize:10,cellPadding:5,lineColor:[27,48,34],lineWidth:0.3,halign:'center'},
        columnStyles:{0:{cellWidth:90,fontStyle:'bold'},1:{cellWidth:'auto'}}
      });

      // Tabla precios — DOS opciones claras
      const precioUSDVal=parseFloat(precioUSD.replace('$',''))||0;
      const pricingBody=[
        ['Precio en USD / USDT / Zelle',precioUSD+' por unidad'],
      ];
      if(cant>1){
        pricingBody.push(['Total lote en USD ('+cant+' pcs)','$'+(precioUSDVal*cant).toFixed(2)]);
      }
      pricingBody.push(['','']);
      pricingBody.push(['Precio en Bolivares (tasa Paralela)',
        (modo==='unit'?'Bs. '+precioVES+' por unidad':'Bs. '+precioVES+' lote completo')]);
      pricingBody.push(['Equivale a (tasa BCV)',precioBCV+(modo==='unit'?' por unidad':' lote')]);
      if(cant>1&&modo==='unit'){
        const totVes=parseFloat(precioVES.replace(/\./g,'').replace(',','.'))||0;
        pricingBody.push(['Total lote en Bs. ('+cant+' pcs)','Bs. '+(totVes*cant).toLocaleString('de-DE',{minimumFractionDigits:2})]);
      }

      doc.autoTable({
        startY:doc.lastAutoTable.finalY+8,
        head:[['Modalidad de Pago','Precio']],
        body:pricingBody,
        theme:'grid',
        headStyles:{fillColor:[45,106,79],textColor:[255,255,255],fontStyle:'bold',fontSize:10,halign:'center',font:'times'},
        styles:{font:'times',fontSize:10,cellPadding:5,lineColor:[27,48,34],lineWidth:0.3,halign:'center'},
        columnStyles:{0:{cellWidth:90,fontStyle:'bold'},1:{cellWidth:'auto'}},
        didParseCell:(data)=>{
          if(data.row.index===0&&data.section==='body'){
            data.cell.styles.fillColor=[240,248,244];
            data.cell.styles.fontStyle='bold';
          }
          if(data.row.index===3&&data.section==='body'){
            data.cell.styles.fillColor=[255,251,235];
          }
        }
      });

      // Nota
      const nota=modo==='unit'
        ?'Precios indicados POR UNIDAD. Para el total multiplique por la cantidad.'
        :'Precios indicados para el LOTE COMPLETO de '+cant+' unidades.';
      doc.setFont('times','italic');doc.setFontSize(9);doc.setTextColor(27,48,34);
      doc.text('(*) '+nota,20,doc.lastAutoTable.finalY+10,{maxWidth:170});
      doc.setFont('times','bold');doc.setFontSize(9);
      doc.text('Terminos y condiciones en la pagina siguiente.',20,doc.lastAutoTable.finalY+18,{maxWidth:170});

      // Pagina 2: Terminos
      doc.addPage();
      doc.setFont('times','bold');doc.setFontSize(14);doc.setTextColor(27,48,34);
      doc.text('TERMINOS Y CONDICIONES DE VENTA',105,25,{align:'center'});
      doc.setLineWidth(0.4);doc.line(20,29,190,29);
      const cls=[
        {t:'1. POLITICA DE PAGO (70/30):',c:'Para iniciar la produccion se requiere el 70% del total. El 30% restante se cancela al momento de entrega o envio.'},
        {t:'2. AJUSTE CAMBIARIO:',c:'Los montos en Bs. se calculan a tasa paralela del dia de la cotizacion. Retrasos superiores a 24h en el pago dan derecho a 3dproject.ve a recalcular el monto a la tasa vigente.'},
        {t:'3. DIFERENCIA USD vs Bs.:',c:'Los precios en USD y en Bs. son equivalentes al momento de la cotizacion. El precio en Bs. se calcula a tasa de mercado (paralela) para proteger el valor de la operacion. Pasadas 24h la cotizacion en Bs. puede variar.'},
        {t:'4. RESPONSABILIDAD DE DISENO:',c:'No somos responsables por fallas derivadas de archivos suministrados por el cliente. Optimizaciones tecnicas pueden generar cargos adicionales.'},
        {t:'5. CANCELACIONES:',c:'Una vez iniciada la manufactura no se reembolsan anticipos por compromiso de materiales, energia y horas de maquina.'},
        {t:'6. PLAZOS:',c:'Los tiempos de entrega son estimados. No nos responsabilizamos por retrasos derivados de fallas electricas o escasez de materia prima.'}
      ];
      let cy=42;
      cls.forEach(item=>{
        doc.setFont('times','bold');doc.setFontSize(11);doc.setTextColor(27,48,34);
        doc.text(item.t,20,cy);cy+=7;
        doc.setFont('times','normal');doc.setFontSize(10);doc.setTextColor(50,50,50);
        const lines=doc.splitTextToSize(item.c,170);
        doc.text(lines,20,cy);cy+=(lines.length*5)+10;
      });
      doc.save('Cotizacion_3dproject_'+cliente.replace(/\s+/g,'_')+'_'+fecha.replace(/\//g,'-')+'.pdf');
      showToast('PDF descargado');
    };

    function txRow(tx,full){
      const isInc=tx.type==='Ingreso';
      const d=tx.date?.seconds?tx.date:{seconds:new Date(tx.date).getTime()/1000};
      return`<div class="tx-item">
        <div class="tx-dot ${isInc?'dot-in':'dot-out'}"></div>
        <div class="tx-body">
          <div class="tx-concept">${tx.concept}</div>
          <div class="tx-meta">${tx.category}${full?` · ${tx.paymentMethod}`:''} · ${fmtD(d)}</div>
          ${full&&tx.bcvRate?`<div class="tx-rates">BCV Bs.${fmt(tx.bcvRate)}${tx.parRate?` · Par Bs.${fmt(tx.parRate)}`:''}</div>`:''}
        </div>
        <div class="tx-right">
          <div class="tx-amt ${isInc?'pos':'neg'}">${isInc?'+':'-'}$${fmt(tx.amount)}</div>
          ${full?`<button class="icon-btn del" onclick="deleteTx('${tx.id}')"><i class="fa-solid fa-trash-can"></i></button>`:''}
        </div>
      </div>`;
    }

    document.addEventListener('DOMContentLoaded',()=>{
      document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
      document.querySelectorAll('.type-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
          document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('sel-in','sel-out'));
          btn.classList.add(btn.dataset.v==='Ingreso'?'sel-in':'sel-out');
          document.getElementById('f-type').value=btn.dataset.v;
        });
      });
      document.getElementById('l-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
    });
  </script>

  <style>
    :root{

    .extra-check label i{color:var(--green);width:14px;text-align:center;}
    .extra-detail{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .extra-unit-price{font-size:11px;color:var(--text3);background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:3px 7px;white-space:nowrap;}
    .extra-qty-wrap{display:flex;align-items:center;gap:5px;}
    .extra-qty-wrap label{font-size:11px;color:var(--text2);white-space:nowrap;}
    .extra-qty-wrap input{width:60px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:var(--font);font-size:13px;padding:5px 8px;outline:none;}
    .extra-qty-wrap input:focus{border-color:var(--green);}
    .extra-qty-wrap input:disabled{opacity:.4;background:var(--bg);}
    .extra-subtotal{font-size:12px;font-weight:700;color:var(--green);margin-left:auto;}
    .cotiz-pdf-btn{width:100%;padding:13px;background:var(--text);border:none;border-radius:var(--r-sm);color:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;margin-top:12px;}
    .cotiz-pdf-btn:hover{opacity:.85;}
    .cotiz-pdf-btn i{font-size:16px;color:#ff6b6b;}
    .cotiz-nota-top{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--text2);background:var(--green-lt);border:1px solid #ccddd5;border-radius:var(--r-sm);padding:10px 14px;margin-bottom:16px;line-height:1.5;}
    .cotiz-nota-top i{color:var(--green);margin-top:2px;flex-shrink:0;}
    .cotiz-subtotal{background:var(--bg);font-weight:600;color:var(--text)!important;border-top:2px solid var(--border2)!important;margin-top:2px;}
    .cotiz-rentabilidad{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;margin-top:12px;}
    .cotiz-rent-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--text2);padding:5px 0;border-bottom:1px solid var(--border);}
    .cotiz-rent-row:last-child{border-bottom:none;}
    .cotiz-rent-row i{color:var(--green);margin-right:5px;}
    .cotiz-tip{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;background:var(--green-lt);color:var(--green);border-radius:50%;font-size:10px;font-weight:700;cursor:help;margin-left:4px;border:1px solid #ccddd5;}
    .cotiz-price-box--amber{background:#7a5c05;color:#fff;border-radius:var(--r);padding:18px;text-align:center;margin-bottom:8px;}
    .cotiz-price-box--amber .cotiz-price-label{opacity:.85;}
    .cotiz-nota-brecha{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--amber);background:#fffbeb;border:1px solid #f0e0a0;border-radius:var(--r-sm);padding:9px 12px;margin-bottom:10px;line-height:1.6;}
    .cotiz-nota-brecha i{flex-shrink:0;margin-top:2px;}
    .cotiz-lote-info--amber{background:#fffbeb;border:1px solid #f0e0a0;}
    .cotiz-lote-info--amber i{color:var(--amber);}

    /* SETTINGS */
    .settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:10px;}
    .settings-label{font-size:13px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:7px;}
    .settings-label i{color:var(--green);font-size:13px;}
    .settings-desc{font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.5;}
    .rates-summary{background:var(--bg);border-radius:var(--r-sm);padding:12px;margin-bottom:14px;}
    .rate-summary-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--text2);padding:5px 0;border-bottom:1px solid var(--border);}
    .rate-summary-row:last-child{border-bottom:none;}
    .btn-action{background:var(--green);border:none;border-radius:var(--r-sm);color:#fff;font-family:var(--font);font-size:14px;font-weight:600;padding:9px 18px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:opacity .15s;}
    .btn-action:hover{opacity:.85;}
    .user-row{display:flex;align-items:center;gap:11px;margin-bottom:14px;}
    .user-initial{width:36px;height:36px;background:var(--green-lt);color:var(--green);border:1px solid #ccddd5;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
    .user-email{font-size:14px;font-weight:500;}
    .user-role{font-size:12px;color:var(--text3);}
    .btn-logout{background:none;border:1px solid var(--border);border-radius:var(--r-sm);color:var(--neg);font-family:var(--font);font-size:13px;font-weight:500;padding:8px 14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .12s;}
    .btn-logout:hover{background:#fdf0f0;border-color:var(--neg);}
    .install-row{font-size:13px;color:var(--text2);padding:9px 0;border-bottom:1px solid var(--border);line-height:1.5;}
    .install-row:last-child{border-bottom:none;}

    /* FAB */
    .fab{position:fixed;bottom:72px;right:16px;background:var(--green);border:none;border-radius:50px;color:#fff;font-family:var(--font);font-size:14px;font-weight:600;padding:12px 20px;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 3px 14px rgba(45,106,79,.3);z-index:50;transition:box-shadow .15s,transform .12s;}
    .fab:hover{box-shadow:0 5px 20px rgba(45,106,79,.4);transform:translateY(-1px);}
    .fab:active{transform:scale(.97);}
    @media(min-width:720px){.fab{bottom:24px;}}

    /* MODAL */
    #tx-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);align-items:flex-end;justify-content:center;z-index:100;}
    @media(min-width:600px){#tx-modal{align-items:center;padding:20px;}.modal-box{border-radius:var(--r)!important;max-height:90vh;}}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;padding:16px 16px 32px;width:100%;max-width:480px;overflow-y:auto;animation:up .2s ease;}
    .modal-handle{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 14px;}
    @media(min-width:600px){.modal-handle{display:none;}}
    .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    #modal-title{font-family:var(--serif);font-size:17px;font-weight:600;}
    .modal-x{width:28px;height:28px;border:1px solid var(--border);border-radius:50%;background:none;color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .modal-x:hover{background:var(--bg);}
    .form-group{margin-bottom:11px;}
    .form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px;}
    .form-group input,.form-group select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:var(--font);font-size:15px;padding:9px 12px;outline:none;transition:border-color .15s;-webkit-appearance:none;}
    .form-group input:focus,.form-group select:focus{border-color:var(--green);}
    .form-row{display:flex;gap:8px;}
    .form-row .form-group{flex:1;}
    .type-toggle{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px;}
    .type-btn{flex:1;padding:8px;border:none;border-radius:5px;background:transparent;color:var(--text2);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
    .type-btn.sel-in{background:var(--surface);color:var(--pos);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.07);}
    .type-btn.sel-out{background:var(--surface);color:var(--neg);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.07);}
    .rate-info{font-size:11px;color:var(--text3);margin-top:4px;}
    .btn-save{width:100%;margin-top:8px;padding:12px;background:var(--green);border:none;border-radius:var(--r-sm);color:#fff;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;}
    .btn-save:hover{opacity:.87;}.btn-save:disabled{opacity:.5;cursor:default;}

    /* TOAST */
    .toast{position:fixed;bottom:-56px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:13px;font-weight:500;padding:9px 18px;border-radius:20px;transition:bottom .26s ease;white-space:nowrap;z-index:999;max-width:90vw;text-align:center;}
    .toast.show{bottom:88px;}
    @media(min-width:720px){.toast.show{bottom:28px;}}
    .toast.err{background:var(--neg);}

    @keyframes up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-icon">$</div>
      <div class="login-logo-text">
        <h1>3dproject<span>.ve</span></h1>
        <p>Gestión financiera</p>
      </div>
    </div>
    <div class="login-form">
      <div class="field"><label>Correo</label><input id="l-email" type="email" placeholder="tu@correo.com" autocomplete="email"/></div>
      <div class="field"><label>Contraseña</label><input id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
      <button id="l-btn" onclick="doLogin()"><i class="fa-solid fa-right-to-bracket"></i> Ingresar</button>
      <div id="l-err"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-shell">
  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">$</div>
      <div class="brand-text">3dproject<span>.ve</span></div>
    </div>
    <div class="topbar-rates">
      <div class="rate-pill" id="bcv-pill">BCV —</div>
      <div class="rate-pill" id="par-pill">Par —</div>
    </div>
  </div>

  <div class="app-body">
    <nav class="sidenav">
      <button class="nav-item active" data-tab="dashboard" onclick="goTab('dashboard')"><i class="fa-solid fa-chart-pie"></i> Inicio</button>
      <button class="nav-item" data-tab="converter" onclick="goTab('converter')"><i class="fa-solid fa-arrows-left-right"></i> Conversor</button>
      <button class="nav-item" data-tab="cotizador" onclick="goTab('cotizador')"><i class="fa-solid fa-file-invoice-dollar"></i> Cotizador</button>
      <button class="nav-item" data-tab="history" onclick="goTab('history')"><i class="fa-solid fa-list-ul"></i> Historial</button>
      <button class="nav-item" data-tab="settings" onclick="goTab('settings')"><i class="fa-solid fa-gear"></i> Ajustes</button>
    </nav>
    <main id="main-content"></main>
  </div>

  <nav class="bottomnav">
    <button class="nav-item active" data-tab="dashboard" onclick="goTab('dashboard')"><i class="fa-solid fa-chart-pie"></i> Inicio</button>
    <button class="nav-item" data-tab="converter" onclick="goTab('converter')"><i class="fa-solid fa-arrows-left-right"></i> Conversor</button>
    <button class="nav-item" data-tab="cotizador" onclick="goTab('cotizador')"><i class="fa-solid fa-file-invoice-dollar"></i> Cotizar</button>
    <button class="nav-item" data-tab="history" onclick="goTab('history')"><i class="fa-solid fa-list-ul"></i> Historial</button>
    <button class="nav-item" data-tab="settings" onclick="goTab('settings')"><i class="fa-solid fa-gear"></i> Ajustes</button>
  </nav>

  <button class="fab" onclick="openForm()"><i class="fa-solid fa-plus"></i> Nueva</button>
</div>

<!-- MODAL NUEVA TRANSACCIÓN -->
<div id="tx-modal" onclick="if(event.target===this)closeForm()">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div id="modal-title">Nueva transacción</div>
      <button class="modal-x" onclick="closeForm()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <form id="tx-form" onsubmit="return false">
      <div class="form-group">
        <label>Tipo</label>
        <div class="type-toggle">
          <button type="button" class="type-btn sel-in" data-v="Ingreso"><i class="fa-solid fa-arrow-down"></i> Ingreso</button>
          <button type="button" class="type-btn" data-v="Egreso"><i class="fa-solid fa-arrow-up"></i> Egreso</button>
        </div>
        <input type="hidden" id="f-type" value="Ingreso"/>
      </div>
      <div class="form-group"><label>Concepto</label><input type="text" id="f-concept" placeholder="Descripción" required/></div>
      <div class="form-row">
        <div class="form-group"><label>Monto (USD)</label><input type="number" id="f-amount" step="0.01" min="0" placeholder="0.00" required/></div>
        <div class="form-group"><label>Fecha</label><input type="date" id="f-date" required/></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Categoría</label>
          <select id="f-cat">
            <option>Ventas</option><option>Pago a Proveedores</option>
            <option>Inversión</option><option>Pago a Socios</option><option>Gastos Operativos</option>
          </select>
        </div>
        <div class="form-group">
          <label>Método de pago</label>
          <select id="f-method">
            <option>Pago Móvil</option><option>Zelle</option>
            <option>Binance</option><option>PayPal</option><option>Efectivo</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Tasa Paralelo usada (editable)</label>
        <input type="number" id="f-par-rate" step="0.01" placeholder="Se usa la tasa del día automáticamente"/>
        <div class="rate-info" id="form-rate-info"></div>
      </div>
      <button type="button" class="btn-save" onclick="saveTx()"><i class="fa-solid fa-floppy-disk"></i> Guardar transacción</button>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>
</body>
</html>
